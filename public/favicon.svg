<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Bouteille rouge inclinée vers la droite -->
  <g transform="translate(32, 32) rotate(18) translate(-32, -32)">
    <!-- Ombre légère -->
    <ellipse cx="32" cy="52" rx="12" ry="3" fill="#00000015"/>

    <!-- Corps de la bouteille -->
    <path d="M 28 10 L 26 18 L 26 48 Q 26 52 32 52 Q 38 52 38 48 L 38 18 L 36 10 Z"
          fill="#991b1b" stroke="#7a1414" stroke-width="0.8"/>

    <!-- Col de la bouteille -->
    <rect x="30" y="5" width="4" height="5" fill="#991b1b" stroke="#7a1414" stroke-width="0.8" rx="0.5"/>

    <!-- Bouchon/capsule -->
    <ellipse cx="32" cy="4.5" rx="3" ry="1.5" fill="#d4a373" stroke="#a67c52" stroke-width="0.8"/>
    <rect x="29.5" y="3" width="5" height="1.5" fill="#d4a373" stroke="#a67c52" stroke-width="0.8" rx="0.3"/>

    <!-- Reflet de verre (highlight) -->
    <ellipse cx="29" cy="30" rx="1.5" ry="10" fill="rgba(255,255,255,0.25)"/>

    <!-- Étiquette -->
    <rect x="27" y="30" width="10" height="14" fill="rgba(255,255,255,0.1)" rx="0.5" opacity="0.6"/>
  </g>
</svg>
